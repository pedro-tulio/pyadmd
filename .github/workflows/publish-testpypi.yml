name: Publish to TestPyPI (dry run)

# Manual dry-run companion to publish.yml. Triggered by hand from the Actions
# tab, so it can be used to verify the build + Trusted Publishing handshake
# against TestPyPI as many times as needed before an irreversible real PyPI
# release (PyPI never allows re-uploading a version number, even deleted ones).
on:
  workflow_dispatch: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pyadmd-dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # Must match a SEPARATE PyPI Trusted Publisher entry configured on
    # https://test.pypi.org (TestPyPI has its own independent publisher list):
    #   owner/repo:        pedro-tulio/pyadmd
    #   workflow filename: publish-testpypi.yml
    #   environment name:  testpypi
    environment:
      name: testpypi
      url: https://test.pypi.org/project/pyadmd/
    permissions:
      id-token: write  # required for OIDC / Trusted Publishing; no API token needed

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: pyadmd-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
