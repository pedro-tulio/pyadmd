name: Publish to PyPI

# Fires when a GitHub Release is published (created via the Releases UI or
# `gh release create`). This is a manual, UI-driven gate: creating a Release
# with tag vX.Y.Z is the action that triggers a real PyPI upload.
on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pyadmd-dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Must match the PyPI Trusted Publisher config exactly:
    #   owner/repo:        pedro-tulio/pyadmd
    #   workflow filename: publish.yml
    #   environment name:  pypi
    environment:
      name: pypi
      url: https://pypi.org/project/pyadmd/
    permissions:
      id-token: write  # required for OIDC / Trusted Publishing; no API token needed

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: pyadmd-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
